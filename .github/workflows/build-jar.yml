# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a package using Gradle and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#Publishing-using-gradle

name: Build Java JAR with Gradle

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

# Enforce Node 24 for all steps in this workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-jar:
    runs-on: ubuntu-latest

    steps:
    # 1. Fetch code from the repository
    - name: Checkout Repository
      uses: actions/checkout@v5

    # 2. Setup the Java Development Kit (JDK) environment
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle' # Automatically caches Gradle dependencies to speed up future runs
        server-id: GitHubPackages
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    # 3. Ensure the Gradle wrapper has executable permissions
    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew

    # 4. Compile and package the project into a .jar file
    - name: Build JAR with Gradle
      run: ./gradlew clean shadowJar

    - name: Publish package to GitHub Packages
      if: startsWith(github.ref, 'refs/tags/v')
      run: ./gradlew publish shadowJar
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: List generated artifacts
      run: find . -path "*/build/libs/*-all.jar"

    # 5. Extract the compiled .jar file and save it as a downloadable GitHub artifact
    - name: Upload JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: whiz-jar
        path: |
          **/build/libs/*-all.jar
        if-no-files-found: error
        retention-days: 30
